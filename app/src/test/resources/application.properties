# Use an in-memory H2 database so tests never need a live PostgreSQL instance
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate generate the schema from entity annotations (H2-compatible DDL)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Flyway scripts contain PostgreSQL-specific syntax (BIGSERIAL, etc.) — skip in tests
spring.flyway.enabled=false

app.auth.gateway-validate-url=http://localhost/mock-auth
