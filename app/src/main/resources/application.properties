spring.application.name=backend

# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5433/postgres
spring.datasource.username=postgres
spring.datasource.password=mehmetDockerPostgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway — disabled until SB4 auto-config issue is resolved; Hibernate creates schema instead
spring.flyway.enabled=false

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# ── Internationalisation ────────────────────────────────────────────────────
# Resource bundle lives at src/main/resources/i18n/messages[_xx].properties.
# Files are read as UTF-8 so Turkish characters (ö, ü, ç, ş, ğ, İ) render
# correctly without needing \uXXXX escapes.
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
spring.messages.use-code-as-default-message=true

# ── Auth / sessions ─────────────────────────────────────────────────────────
# Master switch. Flip to true once the external auth gateway is ready.
# When false, every request is treated as the dev user below.
app.auth.enabled=false
app.auth.dev-user-id=ext-user-001
app.auth.dev-user-email=dev@local

# External auth gateway (only used when app.auth.enabled=true)
app.auth.gateway-validate-url=http://auth-gateway/api/sessions/validate
