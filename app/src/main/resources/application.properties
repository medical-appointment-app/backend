spring.application.name=backend

# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5433/postgres
spring.datasource.username=postgres
spring.datasource.password=mehmetDockerPostgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway — disabled until SB4 auto-config issue is resolved; Hibernate creates schema instead
spring.flyway.enabled=false

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# External auth gateway
app.auth.gateway-validate-url=http://auth-gateway/api/sessions/validate
